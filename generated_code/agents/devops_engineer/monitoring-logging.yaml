# Prometheus and Grafana Monitoring Configuration for AKS Cluster

apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus
  namespace: monitoring
spec:
  serviceMonitorSelector:
    matchLabels:
      team: devops

---

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-management-monitor
  namespace: monitoring
  labels:
    team: devops
spec:
  selector:
    matchLabels:
      app: user-management-backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s