# Azure DevOps Pipeline configuration for CI/CD
trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Define variables for environment-specific configurations
  AZURE_SUBSCRIPTION: 'YourAzureSubscriptionID'
  RESOURCE_GROUP: 'YourResourceGroup'
  AKS_CLUSTER: 'YourAKSClusterName'
  CONTAINER_REGISTRY: 'YourContainerRegistryName'
  IMAGE_NAME: 'user-management-backend'
  IMAGE_TAG: 'latest'

stages:
  - stage: Build
    displayName: Build application and Docker image
    jobs:
      - job: Build
        displayName: Build and Push Docker Image
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
              addToPath: true

          # Install dependencies
          - script: |
              python -m pip install --upgrade pip
              pip install -r backend_engineer/requirements.txt
            displayName: Install Dependencies

          # Run Unit Tests
          - script: |
              python -m unittest discover qa_engineer/unittest_backend.py
            displayName: Run Unit Tests

          # Build Docker Image
          - task: Docker@2
            inputs:
              containerRegistry: '$(CONTAINER_REGISTRY)'
              repository: '$(IMAGE_NAME)'
              command: 'buildAndPush'
              Dockerfile: 'backend_engineer/Dockerfile'
              tags: |
                $(IMAGE_TAG)

  - stage: DeployToAKS
    displayName: Deploy to Azure Kubernetes Service
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: Deploy to AKS
        steps:
          # Azure CLI Login
          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials --resource-group $(RESOURCE_GROUP) --name $(AKS_CLUSTER)

          # Deploy to AKS
          - task: Kubernetes@1
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: '$(AZURE_SUBSCRIPTION)'
              resourceGroupName: '$(RESOURCE_GROUP)'
              kubernetesCluster: '$(AKS_CLUSTER)'
              namespace: 'default'
              command: 'apply'
              useConfigurationFile: true
              configuration: |
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: user-management-backend
                  labels:
                    app: user-management-backend
                spec:
                  replicas: 2
                  selector:
                    matchLabels:
                      app: user-management-backend
                  template:
                    metadata:
                      labels:
                        app: user-management-backend
                    spec:
                      containers:
                      - name: user-management-backend
                        image: $(CONTAINER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG)
                        ports:
                        - containerPort: 5000
                        env:
                        - name: DATABASE_URL
                          valueFrom:
                            secretKeyRef:
                              name: database-secret
                              key: DATABASE_URL
                        - name: JWT_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: jwt-secret
                              key: JWT_SECRET

                ---
                apiVersion: v1
                kind: Service
                metadata:
                  name: user-management-backend
                spec:
                  type: LoadBalancer
                  ports:
                  - port: 80
                    targetPort: 5000
                  selector:
                    app: user-management-backend

          # Verify Deployment
          - script: |
              kubectl get pods
              kubectl get svc
            displayName: Verify Deployment